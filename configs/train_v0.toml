schema_path = "schema/v0.toml"
reward_config_path = "configs/reward_v0.toml"
curriculum_config_path = ""  # e.g. "configs/curriculum_v1.toml"

[env]
num_arenas = 64
blue = 1
orange = 1
seed = 0
# team_size_weights = [0.5, 0.3, 0.2]   # 1v1/2v2/3v3 arena mix; omit = pure 1v1

[net]
hidden = [512, 512]

[ppo]
rollout_steps = 256        # T per iteration -> batch = T * num_agents = 32768
gamma = 0.9954             # ~10s half-life at 15 Hz
lam = 0.95
lr = 2e-4
clip = 0.2
entropy_coef = 0.01
value_coef = 1.0
epochs = 3
minibatch_size = 8192

[run]
device = "cuda"            # falls back to cpu if unavailable
checkpoint_dir = "checkpoints"
save_every_iters = 20
log_every_iters = 1
