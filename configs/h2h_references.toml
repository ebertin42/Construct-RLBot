# Head-to-head reference set for scripts/h2h_eval.py --vs-references.
#
# WHY: self-play goals/min (scripts/eval_metrics.py) moves with both sides'
# defense, not skill -- it hid an 800M-step regression and made a 3.5x-
# weaker policy look like it was improving (docs/training-journal.md,
# 2026-07-19 ~14:50, the KL-anchor kill-switch). Head-to-head against a
# FROZEN reference checkpoint doesn't have that confound: a stronger policy
# wins more of a fixed opponent regardless of how either side's own defense
# trends over training.
#
# Seeded with the project's current high-water mark (confirmed by
# head-to-head, not just self-play -- see the journal entry above: 562M beat
# both the anchored 909M run AND the unanchored 1.38B tip). Add more
# [[reference]] entries as new peaks are confirmed the same way; keep old
# peaks around too so regressions relative to them stay visible.

[[reference]]
ck = "checkpoints_entity/ck_000562083840.pt"
label = "peak-562M"

# Slot for task #54 (external bots) -- the eventual ABSOLUTE anchor. Every
# reference above this line is still just "our own best checkpoint so far",
# which can only ever be a relative ruler against itself.
#
# #54 landed (see docs/external-bench.md, scripts/bench_external.py) but
# this file stays EMPTY of external entries on purpose: h2h_eval.py's
# --vs-references path (run_vs_references -> checkpoint_meta -> torch.load
# expecting our {schema_version, config.net.heads, total_steps} checkpoint
# dict, then MatchRunner rebuilding OUR candle net and playing it inside
# OUR RocketSim engine) cannot consume an external bot without modification.
# Nexto/Necto ship a *.pt TorchScript module with a different architecture,
# observation builder and action space, and only ever run as an independent
# RLBot v5 agent process against the real Rocket League game -- there is no
# in-process MatchRunner path for it. checkpoint_meta(nexto-model.pt) would
# not even load cleanly (it's not our checkpoint dict shape).
#
# External-bot results instead flow through a separate side door:
# scripts/bench_external.py's record-result writes to logs/h2h_history.jsonl
# via the SAME h2h_eval.append_h2h_history function (imported, not
# reimplemented) after a REAL match played on Elliot's Windows RLBot v5
# box -- so they land in the exact same file/schema and the dashboard's
# "Head-to-head (skill)" panel plots them alongside these internal
# references with zero changes to dashboard.py. See
# docs/external-bench.md for the full plan and exact commands.
#
# [[reference]]
# ck = "path/to/external_bot.pt"
# label = "necto-ish"
